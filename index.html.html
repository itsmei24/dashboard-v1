<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PKSE Executive Dashboard - Fixed</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f3f6fb}
.layout{display:flex;min-height:100vh}
.sidebar{width:260px;background:#111827;color:#fff;padding:20px}
.sidebar h2{margin-top:0}
.sidebar label{display:block;margin:12px 0 6px}
.sidebar select,.sidebar input,.sidebar button{width:100%;padding:10px;border-radius:10px;border:1px solid #d1d5db;box-sizing:border-box}
.sidebar button{background:#2563eb;color:#fff;border:none;margin-top:10px;cursor:pointer}
.main{flex:1;padding:20px}
.header{background:linear-gradient(135deg,#111827,#2563eb);color:white;padding:20px;border-radius:16px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:16px 0}
.card,.panel{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.value{font-size:28px;font-weight:700;color:#2563eb}
.row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:16px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
@media(max-width:1000px){.layout{flex-direction:column}.sidebar{width:auto}.kpis,.row,.row2{grid-template-columns:1fr}}
</style>
</head><body>
<div class="layout">
<div class="sidebar">
<h2>Filter</h2>
<label>Bulan</label><select id="bulan"><option value="7">Juli 2026</option></select>
<label>Tanggal Awal</label><input id="awal" type="date" value="2026-07-01">
<label>Tanggal Akhir</label><input id="akhir" type="date" value="2026-07-30">
<label>Kategori</label><select id="kategori"><option>PKSE</option><option>HCS</option><option>ULE</option><option>CIT</option></select>
<button id="applyBtn">Apply Filter</button>
</div>
<div class="main">
<div class="header"><h1>Executive Dashboard PKSE</h1></div>
<div class="kpis">
<div class="card"><div>Current</div><div id="k1" class="value"></div></div>
<div class="card"><div>Average</div><div id="k2" class="value"></div></div>
<div class="card"><div>Maximum</div><div id="k3" class="value"></div></div>
<div class="card"><div>Minimum</div><div id="k4" class="value"></div></div>
<div class="card"><div>Change %</div><div id="k5" class="value"></div></div>
</div>
<div class="panel"><h3>Executive Summary</h3><div id="summary"></div></div>
<div class="row"><div class="panel"><canvas id="trend"></canvas></div><div class="panel"><canvas id="pie"></canvas></div></div>
<div class="row2"><div class="panel"><canvas id="bar"></canvas></div><div class="panel"><canvas id="area"></canvas></div></div>
</div></div>
<script>
const data={HCS:[219,217.46,214.42,215.71,212.02,212.32,211.18,207.45,207.51,203.67,203.13,199.63,196.36,195.77,198.33,195.35,195,195.99,199.5,200.12,199.29,203.09,199.41,202.27,200.57,197.72,195,195,197.47,195],ULE:[105.8,106.32,107.21,106.39,106.69,103.89,101.14,99.36,100.44,100,98.88,99.39,99.11,97.92,99.65,100.84,99.29,99.73,99.88,102.13,103.54,102.22,105.17,102.76,102.26,103.84,101.67,101.6,98.79,99.79],CIT:[0.3,0.38,0.41,0.56,0.46,0.55,0.6,0.65,0.62,0.83,1.2,1.17,1.36,0.76,0.91,1.04,1.55,2,1.57,1.39,1.62,0.85,0.82,0.55,0.34,0.19,0.24,0.15,0.11,0.1],PKSE:[325.1,324.16,322.04,322.66,319.17,316.76,312.92,307.46,308.57,304.5,303.21,300.19,296.83,294.45,298.89,297.23,295.84,297.72,300.95,303.64,304.45,306.16,305.4,305.58,303.17,301.75,296.91,296.75,296.37,294.89]};
let charts=[];
function updateDashboard(){
const cat=kategori.value;
let s=Math.max(0,new Date(awal.value).getDate()-1);
let e=Math.max(s,new Date(akhir.value).getDate()-1);
const vals=data[cat].slice(s,e+1);
const labels=Array.from({length:vals.length},(_,i)=>s+i+1);
const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
const hcs=data.HCS.slice(s,e+1).reduce((a,b)=>a+b,0);
const ule=data.ULE.slice(s,e+1).reduce((a,b)=>a+b,0);
const cit=data.CIT.slice(s,e+1).reduce((a,b)=>a+b,0);
const pkse=data.PKSE.slice(s,e+1);
k1.innerText=vals.at(-1).toFixed(2);k2.innerText=avg.toFixed(2);k3.innerText=Math.max(...vals).toFixed(2);k4.innerText=Math.min(...vals).toFixed(2);k5.innerText=(((vals.at(-1)-vals[0])/vals[0])*100).toFixed(2)+'%';
summary.innerHTML=`Kategori <b>${cat}</b> periode ${s+1}-${e+1} Juli 2026. Rata-rata <b>${avg.toFixed(2)}</b> triliun, maksimum <b>${Math.max(...vals).toFixed(2)}</b>, minimum <b>${Math.min(...vals).toFixed(2)}</b>.`;
charts.forEach(c=>c.destroy());charts=[];
charts.push(new Chart(trend,{type:'line',data:{labels,datasets:[{label:cat,data:vals,borderColor:'#2563eb',fill:false}]}}));
charts.push(new Chart(pie,{type:'pie',data:{labels:['HCS','ULE','CIT'],datasets:[{data:[hcs,ule,cit],backgroundColor:['#2563eb','#10b981','#f59e0b']}]}}));
charts.push(new Chart(bar,{type:'bar',data:{labels:['HCS','ULE','CIT'],datasets:[{data:[hcs,ule,cit],backgroundColor:['#2563eb','#10b981','#f59e0b']}]}}));
charts.push(new Chart(area,{type:'line',data:{labels,datasets:[{label:'PKSE',data:pkse,borderColor:'#7c3aed',backgroundColor:'rgba(124,58,237,.2)',fill:true}]}}));
}
['kategori','awal','akhir','bulan'].forEach(id=>document.getElementById(id).addEventListener('change',updateDashboard));
document.getElementById('applyBtn').addEventListener('click',updateDashboard);
updateDashboard();
</script></body></html>
